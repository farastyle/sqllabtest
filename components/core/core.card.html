  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<body style="padding:16px; background:var(--color-bg); font-family:var(--font-sans, sans-serif);">
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge, Alert, CodeBlock, LabCard } = window.LabSecDesignSystem_8cfb49;
    const Label = ({ children }) => (
      <div style={{ fontSize:'10px', color:'var(--color-text-subtle)', fontFamily:'var(--font-mono)', marginBottom:'8px', marginTop:'4px' }}>
        {children}
      </div>
    );
    function App() {
      return (
        <div style={{ display:'flex', flexDirection:'column', gap:'16px' }}>
          <div>
            <Label>Button — variants + sizes</Label>
            <div style={{ display:'flex', gap:'8px', flexWrap:'wrap', alignItems:'center' }}>
              <Button variant="primary">🚀 Entrar</Button>
              <Button variant="success">🔍 Buscar</Button>
              <Button variant="danger">🗑️ Deletar</Button>
              <Button variant="warning">🔄 Resetar</Button>
              <Button variant="info">ℹ️ Info</Button>
              <Button variant="secondary">Voltar</Button>
              <Button variant="ghost">← Ghost</Button>
              <Button disabled>Disabled</Button>
              <Button size="sm" variant="primary">sm</Button>
              <Button size="lg" variant="primary">lg</Button>
            </div>
          </div>
          <div>
            <Label>Badge — lab identity + semantic</Label>
            <div style={{ display:'flex', gap:'6px', flexWrap:'wrap', alignItems:'center' }}>
              <Badge variant="sqli">SQL Injection</Badge>
              <Badge variant="xss">XSS</Badge>

          </div>
          <div>

            <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
              <Alert variant="sqli" title="📚 Bem-vindo ao Laboratório!">Faça login com um payload SQL Injection e acesse o dashboard.</Alert>
              <Alert variant="warning" title="⚠️ Atenção">Este teste altera os dados do banco para TODOS os alunos.</Alert>
            </div>

          <div>
            <Label>CodeBlock — payload display</Label>
            <CodeBlock label="Payload:">
              {`' UNION SELECT id, email || ':' || senha, 0, false FROM usuarios--`}
            </CodeBlock>
          </div>
          <div>
            <Label>LabCard — hub selection cards</Label>
            <div style={{ display:'flex', gap:'12px' }}>
              <LabCard lab="sqli" title="SQL Injection" description="Login bypass, UNION SELECT e mais 10 testes práticos." />
              <LabCard lab="xss"  title="XSS" description="XSS Refletido na busca e Armazenado no mural." />
              <LabCard lab="idor" title="IDOR" description="Manipulação de IDs e falhas de autorização." />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
