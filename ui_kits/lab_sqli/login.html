<!-- @startingPoint section="Screens" subtitle="SQLi lab login — educational split panel" viewport="900x580" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Login — Laboratório SQL Injection</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
</head>
<body style="height:100vh;overflow:hidden;font-family:'IBM Plex Sans',system-ui,sans-serif;">
<div id="root" style="height:100vh;"></div>
<script type="text/babel">
const IP = {
  shield:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
  lock:`<rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>`,
  'check-circle':`<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`,
  'alert-triangle':`<path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>`,
  'log-in':`<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/>`,
  'arrow-left':`<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>`,
};
function Ic({n,s=18,c='currentColor',w=1.75}) {
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${IP[n]||''}</svg>`;
  return <img src={`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`} width={s} height={s} alt="" style={{display:'inline-block',flexShrink:0,verticalAlign:'middle'}} />;
}

const VALID = [
  { email:'admin@lab.com',       senha:'123456',             perfil:'admin' },
  { email:'admin@nosso-lab.com', senha:'SenhaSuperSecreta123',perfil:'admin' },
  { email:'user@lab.com',        senha:'senha',              perfil:'user'  },
];
const PAYLOADS = ["' OR '1'='1", "' OR 1=1--", "admin' --", "' OR '1'='1' /*"];
const isPayload = e => e.includes("'") || /\bor\b/i.test(e) || e.includes('--') || e.includes('/*');

function Login() {
  const [email, setEmail] = React.useState('');
  const [senha, setSenha]   = React.useState('');
  const [status, setStatus] = React.useState(null); // null | 'success' | 'bypass' | 'error'
  const [loggedAs, setLoggedAs] = React.useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!email || !senha) return;
    if (isPayload(email)) {
      setLoggedAs('admin@lab.com (via SQLi bypass)');
      setStatus('bypass');
      setTimeout(() => { window.location.href = './index.html'; }, 2000);
    } else {
      const match = VALID.find(v => v.email === email && v.senha === senha);
      if (match) {
        setLoggedAs(match.email);
        setStatus('success');
        setTimeout(() => { window.location.href = './index.html'; }, 1500);
      } else {
        setStatus('error');
      }
    }
  };

  const fillPayload = (p) => { setEmail(p); setSenha('qualquer'); setStatus(null); };

  return (
    <div style={{ display:'flex', height:'100vh' }}>
      {/* Left — brand panel */}
      <div style={{ width:'42%', background:'linear-gradient(145deg,#2D3A8C 0%,#4F2F8A 100%)', padding:'40px 36px', display:'flex', flexDirection:'column', justifyContent:'space-between', color:'#fff', overflowY:'auto' }}>
        <div>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:32 }}>
            <Ic n="shield" s={28} c="#fff" w={2} />
            <div>
              <div style={{ fontSize:14, fontWeight:700, lineHeight:1.2 }}>Curso de Testes de Segurança</div>
              <div style={{ fontSize:11, opacity:0.7, marginTop:2 }}>Laboratórios Práticos</div>
            </div>
          </div>

          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase', opacity:0.6, marginBottom:8 }}>Sessão de hoje</div>
            <h1 style={{ fontSize:22, fontWeight:700, lineHeight:1.2, marginBottom:8 }}>Laboratório de SQL Injection</h1>
            <p style={{ fontSize:13, opacity:0.8, lineHeight:1.6 }}>
              Este formulário é <strong>intencionalmente vulnerável</strong>. O objetivo é demonstrar como um ataque de SQLi ignora a autenticação sem conhecer a senha real.
            </p>
          </div>

          <div style={{ borderTop:'1px solid rgba(255,255,255,0.15)', paddingTop:20 }}>
            <div style={{ fontSize:11, letterSpacing:'0.08em', textTransform:'uppercase', opacity:0.6, marginBottom:12 }}>Payloads para testar</div>
            {PAYLOADS.map(p => (
              <button key={p} onClick={() => fillPayload(p)}
                style={{ display:'block', width:'100%', textAlign:'left', background:'rgba(255,255,255,0.08)', border:'1px solid rgba(255,255,255,0.15)', color:'#fff', borderRadius:6, padding:'8px 12px', fontFamily:"'IBM Plex Mono',monospace", fontSize:12, cursor:'pointer', marginBottom:6, transition:'background 0.15s' }}
                onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,0.15)'}
                onMouseLeave={e => e.currentTarget.style.background='rgba(255,255,255,0.08)'}
              >{p}</button>
            ))}
            <p style={{ fontSize:11, opacity:0.55, marginTop:8, lineHeight:1.5 }}>Clique em um payload para preencher o formulário automaticamente.</p>
          </div>
        </div>

        <a href="../lab_hub/index.html" style={{ display:'flex', alignItems:'center', gap:6, color:'rgba(255,255,255,0.55)', textDecoration:'none', fontSize:12 }}>
          <Ic n="arrow-left" s={14} c="rgba(255,255,255,0.55)" /> Voltar aos laboratórios
        </a>
      </div>

      {/* Right — form */}
      <div style={{ flex:1, background:'#F8FAFC', display:'flex', alignItems:'center', justifyContent:'center', padding:40 }}>
        <div style={{ width:'100%', maxWidth:380 }}>
          <div style={{ marginBottom:28 }}>
            <h2 style={{ fontSize:22, fontWeight:700, color:'#0F172A', marginBottom:6 }}>Acesso ao laboratório</h2>
            <p style={{ fontSize:13, color:'#64748B' }}>Use credenciais válidas ou um payload SQLi no campo de e-mail.</p>
          </div>

          {status === 'bypass' && (
            <div style={{ background:'#FEF3C7', border:'1px solid #FDE68A', borderRadius:8, padding:'12px 14px', marginBottom:16, display:'flex', alignItems:'flex-start', gap:10 }}>
              <Ic n="alert-triangle" s={18} c="#D97706" />
              <div>
                <div style={{ fontSize:13, fontWeight:700, color:'#92400E' }}>SQLi bypass bem-sucedido!</div>
                <div style={{ fontSize:12, color:'#92400E', marginTop:2 }}>Autenticado como: {loggedAs}</div>
                <div style={{ fontSize:11, color:'#A16207', marginTop:4 }}>Redirecionando para o dashboard…</div>
              </div>
            </div>
          )}
          {status === 'success' && (
            <div style={{ background:'#DCFCE7', border:'1px solid #BBF7D0', borderRadius:8, padding:'12px 14px', marginBottom:16, display:'flex', alignItems:'center', gap:10 }}>
              <Ic n="check-circle" s={18} c="#16A34A" />
              <div style={{ fontSize:13, fontWeight:600, color:'#15803D' }}>Login realizado — redirecionando…</div>
            </div>
          )}
          {status === 'error' && (
            <div style={{ background:'#FEF2F2', border:'1px solid #FECACA', borderRadius:8, padding:'12px 14px', marginBottom:16, display:'flex', alignItems:'center', gap:10 }}>
              <Ic n="alert-triangle" s={18} c="#DC2626" />
              <div style={{ fontSize:13, fontWeight:600, color:'#DC2626' }}>Usuário ou senha inválidos.</div>
            </div>
          )}

          <form onSubmit={handleSubmit} style={{ display:'flex', flexDirection:'column', gap:14 }}>
            <div>
              <label style={{ fontSize:12, fontWeight:600, color:'#374151', display:'block', marginBottom:5 }}>E-mail</label>
              <input value={email} onChange={e => { setEmail(e.target.value); setStatus(null); }}
                placeholder="Ex: ' OR '1'='1  ou  admin@lab.com"
                style={{ width:'100%', padding:'11px 14px', border:'1.5px solid', borderColor: isPayload(email) && email ? '#F59E0B' : '#D1D5DB', borderRadius:8, fontSize:13, fontFamily:'inherit', outline:'none', background: isPayload(email) && email ? '#FFFBEB' : '#fff', color:'#0F172A', transition:'border-color 0.15s' }}
              />
              {isPayload(email) && email && <div style={{ fontSize:11, color:'#D97706', marginTop:4, fontFamily:"'IBM Plex Mono',monospace" }}>Payload SQLi detectado</div>}
            </div>
            <div>
              <label style={{ fontSize:12, fontWeight:600, color:'#374151', display:'block', marginBottom:5 }}>Senha</label>
              <input type="password" value={senha} onChange={e => { setSenha(e.target.value); setStatus(null); }}
                placeholder="Qualquer senha ao usar payload"
                style={{ width:'100%', padding:'11px 14px', border:'1.5px solid #D1D5DB', borderRadius:8, fontSize:13, fontFamily:'inherit', outline:'none', background:'#fff', color:'#0F172A' }}
              />
            </div>
            <button type="submit" disabled={status==='bypass'||status==='success'}
              style={{ padding:'12px', background:'linear-gradient(135deg,#3B55C8,#5B3FA6)', color:'#fff', border:'none', borderRadius:8, fontSize:14, fontWeight:700, cursor: (status==='bypass'||status==='success') ? 'default' : 'pointer', fontFamily:'inherit', opacity: (status==='bypass'||status==='success') ? 0.7 : 1, display:'flex', alignItems:'center', justifyContent:'center', gap:8, marginTop:4 }}>
              <Ic n="log-in" s={16} c="#fff" /> Entrar no Laboratório
            </button>
          </form>

          <div style={{ marginTop:20, padding:'12px 14px', background:'#F1F5F9', borderRadius:8, fontSize:11, color:'#64748B', lineHeight:1.6 }}>
            <strong>Credenciais válidas:</strong> admin@lab.com / 123456 &nbsp;·&nbsp; user@lab.com / senha
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Login />);
</script>
</body>
</html>
