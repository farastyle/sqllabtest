<!-- @dsCard group="XSS Lab" viewport="1100x700" name="XSS Dashboard v2" subtitle="Lucide icons, muted green, search + stored mural" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XSS — Laboratório</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>* { box-sizing: border-box; margin: 0; padding: 0; } body { height:100vh; overflow:hidden; }</style>
</head>
<body style="font-family:'IBM Plex Sans',system-ui,sans-serif;">
<div id="root" style="height:100vh;display:flex;flex-direction:column;"></div>
<script type="text/babel">
const ACC = '#2D8F52';
const IP={
  'arrow-left':`<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>`,
  bell:`<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>`,
  'code-2':`<path d="m18 16 4-4-4-4"/><path d="m6 8-4 4 4 4"/><path d="m14.5 4-5 16"/>`,
  eye:`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`,
  'external-link':`<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" x2="21" y1="14" y2="3"/>`,
  image:`<rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>`,
  keyboard:`<rect width="20" height="16" x="2" y="4" rx="2"/><path d="M6 8h.001"/><path d="M10 8h.001"/><path d="M14 8h.001"/><path d="M18 8h.001"/><path d="M8 12h.001"/><path d="M12 12h.001"/><path d="M16 12h.001"/><path d="M7 16h10"/>`,
  layers:`<path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>`,
  'log-in':`<path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" x2="3" y1="12" y2="12"/>`,
  'message-square':`<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>`,
  monitor:`<rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/>`,
  'mouse-pointer':`<path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/>`,
  shield:`<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>`,
};
function Ic({n,s=18,c='currentColor',w=1.75}) {
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round">${IP[n]||''}</svg>`;
  return <img src={`data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`} width={s} height={s} alt="" style={{display:'inline-block',flexShrink:0,verticalAlign:'middle'}} />;
}

const TESTS=[
  {id:1,icon:'bell',          name:'Alert Básico',          onde:'Busca e Mural', payload:`<script>alert('XSS executado!')<\/script>`,                         desc:'Executa código JS no navegador'},
  {id:2,icon:'eye',           name:'Exibir Cookies',        onde:'Busca e Mural', payload:`<script>alert('Cookie: ' + document.cookie)<\/script>`,              desc:'Lê dados de sessão do navegador'},
  {id:3,icon:'code-2',        name:'Manipulação de DOM',    onde:'Busca e Mural', payload:`<script>document.title = 'PÁGINA ALTERADA'<\/script>`,               desc:'Altera elementos da página'},
  {id:4,icon:'monitor',       name:'Defacement',            onde:'Mural',         payload:`<script>document.body.innerHTML='<h1>HACKED</h1>'<\/script>`,         desc:'Substitui todo o conteúdo da página'},
  {id:5,icon:'log-in',        name:'Login Falso (Phishing)',onde:'Mural',         payload:`<div style="...">Formulário de login falso</div>`,                   desc:'Formulário fake captura credenciais'},
  {id:6,icon:'image',         name:'IMG onerror',           onde:'Busca e Mural', payload:`<img src="x" onerror="alert('XSS via img')">`,                       desc:'XSS sem tag script'},
  {id:7,icon:'layers',        name:'SVG onload',            onde:'Busca e Mural', payload:`<svg onload="alert('XSS via SVG')"></svg>`,                          desc:'XSS via elemento SVG'},
  {id:8,icon:'external-link', name:'Redirecionamento',      onde:'Mural',         payload:`<script>window.location='https://example.com'<\/script>`,            desc:'Redireciona para outro site'},
  {id:9,icon:'mouse-pointer', name:'Evento onmouseover',    onde:'Mural',         payload:`<div onmouseover="alert('hover XSS')">Passe o mouse aqui</div>`,     desc:'Ativado ao passar o mouse'},
  {id:10,icon:'keyboard',     name:'Keylogger Simples',     onde:'Mural',         payload:`<script>document.onkeypress=e=>console.log(e.key)<\/script>`,        desc:'Registra teclas digitadas'},
];

const PRODS=[{nome:'Curso de QA Manual',preco:'197.00'},{nome:'Curso de Automação com Cypress',preco:'297.00'},{nome:'Caneca "Roda na Minha Máquina"',preco:'39.90'},{nome:'Mouse Gamer Ergonômico',preco:'159.90'},{nome:'Teclado Mecânico Switch Blue',preco:'249.90'}];
const SEED_C=[{autor:'Professor',msg:'Bem-vindo ao Mural! Use os payloads da barra lateral para testar o XSS Armazenado. 🔬',ts:'09:00'},{autor:'Aluno Teste',msg:'Curso muito bom, aprendendo bastante!',ts:'09:15'}];

function Item({t,active,onToggle}) {
  return (
    <div>
      <div onClick={onToggle} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'10px 12px', borderRadius:8, cursor:'pointer', background: active?ACC+'18':'transparent', border: active?`1.5px solid ${ACC}35`:'1.5px solid transparent', marginBottom:3 }}>
        <div style={{ marginTop:1 }}><Ic n={t.icon} s={15} c={active?ACC:'#64748B'} /></div>
        <div>
          <div style={{ fontSize:12, fontWeight:600, color: active?ACC:'#334155' }}>{t.name}</div>
          <div style={{ fontSize:11, color:'#94A3B8', marginTop:2 }}>{t.desc}</div>
        </div>
      </div>
      {active && (
        <div style={{ background:ACC+'0A', borderLeft:`3px solid ${ACC}`, padding:'10px 12px', marginBottom:4, borderRadius:'0 6px 6px 0', marginLeft:4 }}>
          <div style={{ fontSize:11, color:'#64748B', fontWeight:600, marginBottom:3 }}>Onde testar: {t.onde}</div>
          <code style={{ display:'block', background:'#fff', padding:'7px 10px', borderRadius:6, border:`1px solid ${ACC}40`, fontFamily:"'IBM Plex Mono',monospace", fontSize:10, wordBreak:'break-all', whiteSpace:'pre-wrap', color:'#334155', lineHeight:1.5 }}>{t.payload}</code>
          <div style={{ fontSize:10, color:'#94A3B8', marginTop:6 }}>Copie e cole na busca ou no mural</div>
        </div>
      )}
    </div>
  );
}

function SearchPanel() {
  const [termo,setTermo]=React.useState('');
  const [searched,setSearched]=React.useState(false);
  const filtered=PRODS.filter(p=>termo===''||p.nome.toLowerCase().includes(termo.toLowerCase()));
  return (
    <div>
      <div style={{ background:`linear-gradient(135deg,#2D8F52,#1e6b3e)`, color:'#fff', padding:'18px 20px', borderRadius:10, marginBottom:16 }}>
        <h2 style={{ fontSize:17, fontWeight:700 }}>Busca de Produtos</h2>
        <p style={{ fontSize:12, opacity:0.8, marginTop:3 }}>XSS Refletido — o termo buscado aparece direto na resposta, sem escape.</p>
      </div>
      <div style={{ display:'flex', gap:10, marginBottom:14 }}>
        <input value={termo} onChange={e=>{setTermo(e.target.value);setSearched(false);}} placeholder="Buscar produto (ou colar payload XSS)…" style={{ flex:1, padding:'10px 14px', border:`1.5px solid ${ACC}`, borderRadius:8, fontSize:13, fontFamily:'inherit', outline:'none' }} />
        <button onClick={()=>setSearched(true)} style={{ padding:'10px 18px', background:ACC, color:'#fff', border:'none', borderRadius:8, fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>Buscar</button>
      </div>
      {searched && termo && <div style={{ background:'#FFFBEB', border:'1px solid #FDE68A', borderRadius:8, padding:'9px 12px', marginBottom:12, fontSize:12, color:'#92400E' }}>Resultados para: <strong>"{termo}"</strong> — em produção este texto seria renderizado sem escape (XSS Refletido).</div>}
      <table style={{ width:'100%', borderCollapse:'collapse' }}>
        <thead><tr style={{ background:'#F8FAFC', borderBottom:'2px solid #E2E8F0' }}>
          {['Produto','Preço'].map(h=><th key={h} style={{ padding:'9px 12px', textAlign:'left', fontSize:12, fontWeight:600, color:'#64748B' }}>{h}</th>)}
        </tr></thead>
        <tbody>
          {filtered.length===0?<tr><td colSpan={2} style={{ padding:16, textAlign:'center', color:'#94A3B8', fontSize:13 }}>Nenhum resultado.</td></tr>
          :filtered.map((p,i)=><tr key={i} style={{ borderBottom:'1px solid #F1F5F9' }}><td style={{ padding:'9px 12px', fontSize:13, color:'#1E293B' }}>{p.nome}</td><td style={{ padding:'9px 12px', fontSize:13, color:'#334155' }}>R$ {p.preco}</td></tr>)}
        </tbody>
      </table>
    </div>
  );
}

function MuralPanel() {
  const [comments,setComments]=React.useState(SEED_C);
  const [autor,setAutor]=React.useState('');
  const [msg,setMsg]=React.useState('');
  const post=()=>{
    if(!autor.trim()||!msg.trim())return;
    const now=new Date();
    setComments(p=>[...p,{autor:autor.trim(),msg:msg.trim(),ts:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`}]);
    setMsg('');
  };
  return (
    <div>
      <div style={{ background:`linear-gradient(135deg,#2D8F52,#1e6b3e)`, color:'#fff', padding:'18px 20px', borderRadius:10, marginBottom:16 }}>
        <h2 style={{ fontSize:17, fontWeight:700 }}>Mural de Recados — Lab 1</h2>
        <p style={{ fontSize:12, opacity:0.8, marginTop:3 }}>XSS Armazenado — payloads ficam salvos para todos os visitantes.</p>
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:8, marginBottom:16 }}>
        {comments.map((c,i)=>(
          <div key={i} style={{ background: i<2?ACC+'08':'#fff', border:'1px solid #E2E8F0', borderRadius:8, padding:'10px 14px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
              <strong style={{ fontSize:12, color: ACC }}>{c.autor}</strong>
              <span style={{ fontSize:11, color:'#94A3B8' }}>{c.ts}</span>
            </div>
            <div style={{ fontSize:13, color:'#334155', lineHeight:1.6 }}>{c.msg}</div>
          </div>
        ))}
      </div>
      <div style={{ background:'#F8FAFC', border:'1px solid #E2E8F0', borderRadius:8, padding:14 }}>
        <div style={{ fontSize:12, fontWeight:600, color:'#334155', marginBottom:10 }}>Deixar um recado:</div>
        <input value={autor} onChange={e=>setAutor(e.target.value)} placeholder="Seu nome" style={{ width:'100%', padding:'9px 12px', border:'1px solid #E2E8F0', borderRadius:7, fontSize:13, fontFamily:'inherit', marginBottom:8, outline:'none' }} />
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder="Mensagem (ou payload XSS)…" rows={3} style={{ width:'100%', padding:'9px 12px', border:'1px solid #E2E8F0', borderRadius:7, fontSize:13, fontFamily:'inherit', resize:'vertical', marginBottom:8, outline:'none' }} />
        <button onClick={post} style={{ padding:'9px 18px', background:ACC, color:'#fff', border:'none', borderRadius:7, fontSize:13, fontWeight:600, cursor:'pointer', fontFamily:'inherit' }}>Publicar</button>
      </div>
    </div>
  );
}

function XSSLab() {
  const [active,setActive]=React.useState(null);
  const [view,setView]=React.useState('buscar');
  const toggle=id=>setActive(p=>p===id?null:id);
  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>
      <header style={{ background:'#fff', borderBottom:'1px solid #E2E8F0', padding:'11px 24px', display:'flex', alignItems:'center', justifyContent:'space-between', flexShrink:0 }}>
        <div style={{ display:'flex', alignItems:'center', gap:12 }}>
          <a href="../lab_hub/index.html" style={{ display:'flex', alignItems:'center', gap:5, color:'#64748B', textDecoration:'none', fontSize:12, fontWeight:500 }}><Ic n="arrow-left" s={13} c="#64748B" /> Laboratórios</a>
          <span style={{ color:'#E2E8F0', padding:'0 2px' }}>|</span>
          <div style={{ display:'flex', alignItems:'center', gap:7 }}>
            <div style={{ width:26, height:26, background:ACC+'18', borderRadius:6, display:'flex', alignItems:'center', justifyContent:'center' }}><Ic n="code-2" s={14} c={ACC} /></div>
            <span style={{ fontSize:13, fontWeight:700, color:'#0F172A' }}>Cross-Site Scripting (XSS)</span>
          </div>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}><Ic n="shield" s={15} c="#4F66D4" /><span style={{ fontSize:11, color:'#64748B' }}>Curso de Testes de Segurança</span></div>
      </header>
      <div style={{ display:'flex', flex:1, overflow:'hidden' }}>
        <div style={{ width:260, background:'#F8FAFC', borderRight:'1px solid #E2E8F0', padding:'16px 12px', overflowY:'auto', flexShrink:0 }}>
          <div style={{ fontSize:11, fontWeight:700, color:'#94A3B8', letterSpacing:'0.07em', textTransform:'uppercase', marginBottom:10, paddingLeft:4 }}>10 Testes</div>
          {TESTS.map(t=><Item key={t.id} t={t} active={active===t.id} onToggle={()=>toggle(t.id)} />)}
          <div style={{ marginTop:12, borderTop:'1px solid #E2E8F0', paddingTop:12 }}>
            <button onClick={()=>setActive(null)} style={{ width:'100%', padding:'9px', background:'#C97428', color:'#fff', border:'none', borderRadius:7, fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', marginBottom:6 }}>Resetar mural</button>
            <a href="../lab_hub/index.html" style={{ display:'block', textAlign:'center', padding:'9px', background:'#6B7280', color:'#fff', textDecoration:'none', borderRadius:7, fontSize:12, fontWeight:600 }}>Trocar laboratório</a>
          </div>
        </div>
        <div style={{ flex:1, padding:24, overflowY:'auto', background:'#fff' }}>
          <div style={{ display:'flex', gap:10, marginBottom:20 }}>
            {['buscar','mural'].map(v=>(
              <button key={v} onClick={()=>setView(v)} style={{ padding:'8px 18px', borderRadius:7, cursor:'pointer', fontWeight:600, fontSize:12, fontFamily:'inherit', background: view===v?ACC:'#F1F5F9', color: view===v?'#fff':'#64748B', border:'none' }}>
                {v==='buscar'?'Busca de Produtos':'Mural de Recados'}
              </button>
            ))}
          </div>
          {view==='buscar'?<SearchPanel />:<MuralPanel />}
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<XSSLab />);
</script>
</body>
</html>
