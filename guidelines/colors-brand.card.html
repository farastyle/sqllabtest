<!-- @dsCard group="Colors" viewport="700x140" name="Brand" subtitle="Primary purple gradient + brand anchors" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg); padding: 16px; font-family: var(--font-sans, sans-serif); }
    .row { display: flex; gap: 10px; }
    .swatch { display: flex; flex-direction: column; gap: 4px; }
    .chip { height: 56px; border-radius: var(--radius-sm); }
    .label { font-size: 10px; color: var(--color-text-muted); text-align: center; }
    .val { font-size: 10px; color: var(--color-text-subtle); text-align: center; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch">
      <div class="chip" style="width:130px; background: var(--color-sqli-gradient);"></div>
      <div class="label">Brand Gradient</div>
      <div class="val">--color-sqli-gradient</div>
    </div>
    <div class="swatch">
      <div class="chip" style="width:80px; background: var(--color-brand);"></div>
      <div class="label">--color-brand</div>
      <div class="val">#667eea</div>
    </div>
    <div class="swatch">
      <div class="chip" style="width:80px; background: var(--color-brand-alt);"></div>
      <div class="label">--color-brand-alt</div>
      <div class="val">#764ba2</div>
    </div>
    <div class="swatch">
      <div class="chip" style="width:80px; background: var(--color-sqli-surface); border: 1px solid var(--color-border);"></div>
      <div class="label">--color-sqli-surface</div>
      <div class="val">#f0f4ff</div>
    </div>
    <div class="swatch">
      <div class="chip" style="width:80px; background: var(--color-sqli-border); opacity:.35;"></div>
      <div class="label">--color-sqli-border</div>
      <div class="val">#667eea</div>
    </div>
  </div>
</body>
</html>
