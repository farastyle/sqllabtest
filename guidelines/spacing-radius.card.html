<!-- @dsCard group="Spacing" viewport="700x110" name="Radius" subtitle="Border radius tokens — sm (4px) and md (8px)" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg-secondary); padding: 16px; font-family: var(--font-sans, sans-serif); }
    .row { display: flex; gap: 16px; align-items: center; }
    .box { background: var(--color-brand); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 20px; }
    .token { font-size: 11px; color: var(--color-text-subtle); font-family: var(--font-mono); margin-top: 6px; }
  </style>
</head>
<body>
  <div class="row">
    <div>
      <div class="box" style="border-radius: 0; color:#fff; font-size:11px;">--radius-0</div>
      <div class="token">0px — tables, cells</div>
    </div>
    <div>
      <div class="box" style="border-radius: var(--radius-sm); color:#fff; font-size:11px;">--radius-sm</div>
      <div class="token">4px — buttons, inputs, panels</div>
    </div>
    <div>
      <div class="box" style="border-radius: var(--radius-md); color:#fff; font-size:11px;">--radius-md</div>
      <div class="token">8px — cards, headers, containers</div>
    </div>
    <div>
      <div class="box" style="border-radius: var(--radius-full); color:#fff; font-size:11px; padding: 8px 20px;">--radius-full</div>
      <div class="token">9999px — badges, pills</div>
    </div>
  </div>
</body>
</html>
