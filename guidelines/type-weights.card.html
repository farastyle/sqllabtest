<!-- @dsCard group="Type" viewport="700x140" name="Weights" subtitle="IBM Plex Sans — four weights in use" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg); padding: 16px 20px; font-family: var(--font-sans, sans-serif); }
    .row { display: flex; align-items: baseline; gap: 16px; padding: 7px 0; border-bottom: 1px solid var(--color-border); }
    .token { font-size: 10px; color: var(--color-text-subtle); font-family: var(--font-mono); width: 140px; flex-shrink: 0; }
    .sample { font-size: var(--text-lg); color: var(--color-text-primary); }
  </style>
</head>
<body>
  <div class="row"><div class="token">--font-normal  400</div><div class="sample" style="font-weight:400;">Busca de produtos e payloads SQLi</div></div>
  <div class="row"><div class="token">--font-medium  500</div><div class="sample" style="font-weight:500;">Busca de produtos e payloads SQLi</div></div>
  <div class="row"><div class="token">--font-semibold 600</div><div class="sample" style="font-weight:600;">Busca de produtos e payloads SQLi</div></div>
  <div class="row"><div class="token">--font-bold    700</div><div class="sample" style="font-weight:700;">Busca de produtos e payloads SQLi</div></div>
</body>
</html>
