<!-- @dsCard group="Colors" viewport="700x140" name="Neutrals" subtitle="Background, border, and text hierarchy" -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../styles.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--color-bg-secondary); padding: 14px; font-family: var(--font-sans, sans-serif); }
    .row { display: flex; gap: 6px; }
    .swatch { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .chip { height: 44px; border-radius: var(--radius-sm); border: 1px solid rgba(0,0,0,.06); }
    .label { font-size: 9px; color: var(--color-text-muted); text-align: center; }
    .val { font-size: 9px; color: var(--color-text-subtle); text-align: center; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="row">
    <div class="swatch"><div class="chip" style="background:#fff;"></div><div class="label">bg</div><div class="val">#fff</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-bg-secondary);"></div><div class="label">bg-secondary</div><div class="val">#f5f5f5</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-bg-muted);"></div><div class="label">bg-muted</div><div class="val">#f9f9f9</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-border);"></div><div class="label">border</div><div class="val">#ddd</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-text-subtle);"></div><div class="label">text-subtle</div><div class="val">#999</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-text-muted);"></div><div class="label">text-muted</div><div class="val">#666</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-text-secondary);"></div><div class="label">text-secondary</div><div class="val">#555</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-text-primary);"></div><div class="label">text-primary</div><div class="val">#333</div></div>
    <div class="swatch"><div class="chip" style="background:var(--color-highlight-row);"></div><div class="label">highlight-row</div><div class="val">#fff3cd</div></div>
  </div>
</body>
</html>
