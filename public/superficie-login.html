<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Laboratório — Superfície de Ataque</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <style>
        .surf-gradient {
            background: linear-gradient(135deg, #DC2626 0%, #B91C1C 100%);
            color: white; padding: var(--space-7) var(--space-6);
            border-radius: var(--radius-md); margin-bottom: var(--space-6); text-align: center;
        }
        .surf-gradient h1 { margin: 0 0 6px 0; font-size: var(--text-2xl); }
        .surf-gradient p  { margin: 0; opacity: 0.85; font-size: var(--text-sm); }
        .credenciais-hint {
            background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius-md);
            padding: var(--space-4) var(--space-5); margin-bottom: var(--space-5);
            font-size: var(--text-sm); color: #374151;
        }
        .credenciais-hint strong { color: #DC2626; }
        .credenciais-hint code {
            background: #fee2e2; padding: 1px 5px; border-radius: 3px; font-size: 12px;
        }
    </style>
</head>
<body class="ds-body">
    <div class="ds-container-sm" style="max-width: 460px; margin: 60px auto;">

        <div class="surf-gradient">
            <h1>🎯 Superfície de Ataque</h1>
            <p>Mapear ameaças e riscos em aplicações e APIs</p>
        </div>

        <div id="erro-login" class="ds-alert ds-alert--danger" style="display:none; text-align:center; margin-bottom: var(--space-5);">
            ❌ Usuário ou senha inválidos.
        </div>

        <div class="credenciais-hint">
            <strong>Como entrar:</strong> use seu <strong>primeiro nome em minúsculas</strong> como usuário,
            e a <strong>letra maiúscula do seu sobrenome</strong> como senha.<br>
            Exemplo: <code>antonio</code> / <code>M</code>
        </div>

        <form action="/superficie/login" method="POST" class="ds-card" style="text-align:left; cursor:default; border-top: 4px solid #DC2626;">
            <label class="ds-label">Usuário <span style="color:#94A3B8;font-weight:400;">(primeiro nome, minúsculas)</span>:</label>
            <input type="text" name="usuario" required class="ds-input" placeholder="ex: antonio" autocomplete="off">

            <label class="ds-label">Senha <span style="color:#94A3B8;font-weight:400;">(letra maiúscula do sobrenome)</span>:</label>
            <input type="password" name="senha" required class="ds-input" placeholder="ex: M" maxlength="3">

            <button type="submit" class="ds-btn ds-btn--full" style="background:#DC2626; color:white; margin-top: var(--space-3);">
                🎯 Entrar no Laboratório
            </button>
        </form>

        <div style="text-align:center; margin-top: var(--space-5);">
            <a href="/" class="ds-link" style="color: var(--color-text-subtle); font-size: var(--text-sm);">← Voltar ao Hub</a>
        </div>
    </div>

    <script>
        if (new URLSearchParams(window.location.search).get('erro') === '1') {
            document.getElementById('erro-login').style.display = 'block';
        }
    </script>
</body>
</html>
